<!DOCTYPE html>
<html>

<head>
    <title>Matrix Generator</title>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="styles.css">
    <script src="colors.js"></script>
</head>

<body>
    <main class="app-shell">
        <section class="control-panel" aria-labelledby="pageTitle">
            <aside class="brand-card" aria-label="Oxymoron Technique">
                <img src="img/oxymoron-x.png" alt="" class="brand-logo">
                <div class="brand-info">
                    <p>Oxymoron Technique</p>
                    <nav class="brand-links" aria-label="Oxymoron Technique links">
                        <a href="https://oxymoron-technique.com" target="_blank" rel="noopener noreferrer">Website</a>
                        <a href="https://www.youtube.com/@OxymoronTechnique" target="_blank" rel="noopener noreferrer">YouTube</a>
                    </nav>
                </div>
            </aside>

            <div class="title-block">
                <h1 id="pageTitle">Matri<img src="img/logo.svg" alt="Matrix Generator" class="x-img"> Generator</h1>
            </div>
            <div class="options" aria-label="Generator options">
                <label class="option">
                    <input type="checkbox" id="lettersCheckbox" checked />
                    <span>Letters</span>
                </label>

                <label class="option">
                    <input type="checkbox" id="numbersCheckbox" checked />
                    <span>Numbers</span>
                </label>

                <label class="option">
                    <input type="checkbox" id="specialCharsCheckbox" checked />
                    <span>Special Characters</span>
                </label>
            </div>

            <label class="field">
                <span>Columns</span>
                <input type="number" id="numLinesInput" min="1" value="110" />
            </label>

            <div class="actions">
                <button id="generateButton" type="button">Generate</button>
            </div>
        </section>

        <section class="output-panel" aria-label="Generated text">
            <button id="copyButton" class="icon-button copy-button" type="button" aria-label="Copy output" title="Copy output">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <div id="output"></div>
        </section>
    </main>
    <script>
        let generatedPlainText = '';

        async function copyOutput() {
            const copyButton = document.getElementById('copyButton');

            if (!generatedPlainText) {
                copyButton.classList.add('is-empty');
                copyButton.setAttribute('title', 'Nothing to copy');
                setTimeout(() => {
                    copyButton.classList.remove('is-empty');
                    copyButton.setAttribute('title', 'Copy output');
                }, 1200);
                return;
            }

            try {
                await navigator.clipboard.writeText(generatedPlainText);
                copyButton.classList.add('is-copied');
                copyButton.setAttribute('title', 'Copied');
            } catch (error) {
                const textarea = document.createElement('textarea');
                textarea.value = generatedPlainText;
                textarea.setAttribute('readonly', '');
                textarea.className = 'copy-buffer';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyButton.classList.add('is-copied');
                copyButton.setAttribute('title', 'Copied');
            }

            setTimeout(() => {
                copyButton.classList.remove('is-copied');
                copyButton.setAttribute('title', 'Copy output');
            }, 1200);
        }

        function generateRandomText() {
            const outputDiv = document.getElementById('output');
            const lettersCheckbox = document.getElementById('lettersCheckbox');
            const numbersCheckbox = document.getElementById('numbersCheckbox');
            const specialCharsCheckbox = document.getElementById('specialCharsCheckbox');
            const numLinesInput = document.getElementById('numLinesInput');

            let characters = '';

            if (lettersCheckbox.checked) {
                // characters += 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
                characters += 'abcdefghijklmnopqrstuvwxyz ';
            }

            if (numbersCheckbox.checked) {
                characters += '0123456789 ';
            }

            if (specialCharsCheckbox.checked) {
                // characters += 'ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩαβγδεζηθικλμνξοπρςστυφχψω';
                characters += 'αβγδεζηθικλμνξοπρςστυφχψω ';
            }

            const numLines = parseInt(numLinesInput.value);
            let generatedText = '';
            generatedPlainText = '';

            const minLength = 15;
            //   const startColor = '#ff0000';
            //   const endColor = '#0000ff';
            for (let j = 0; j < numLines; j++) {
                const textLength = Math.floor(Math.random() * 200) + 1; // Random length between 1 and 100
                const shiftLength = Math.floor(Math.random() * 20);
                let line = ' '.repeat(shiftLength);

                for (let i = minLength; i < textLength + minLength; i++) {
                    const randomIndex = Math.floor(Math.random() * characters.length);
                    const randomOpacity = Math.random() + 0.1;
                    //   const randomColor = getRandomColorBetween(startColor, endColor);
                    const character = characters.charAt(randomIndex);
                    line += `<span style="opacity: ${randomOpacity};">${character}</span>`;
                }

                generatedText += `${line}<br />`;
                generatedPlainText += `${line.replace(/<[^>]*>/g, '')}\n`;
            }

            outputDiv.innerHTML = generatedText;
        }

        const generateButton = document.getElementById('generateButton');
        const copyButton = document.getElementById('copyButton');
        generateButton.addEventListener('click', generateRandomText);
        copyButton.addEventListener('click', copyOutput);
    </script>
</body>

</html>
